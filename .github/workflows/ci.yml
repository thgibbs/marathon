name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: marathon
          POSTGRES_PASSWORD: marathon
          POSTGRES_DB: marathon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U marathon -d marathon"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30

    env:
      DATABASE_URL: postgres://marathon:marathon@localhost:5432/marathon

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      # Kernel demos first (design §0.6, roadmap §2c): the loop is the
      # critical path. demo-kernel = K1-K5 (the K6 umbrella); demo-k1 is the
      # legacy submit-path regression kept until deletion.
      - name: Kernel demo (K1 legacy submit path)
        run: pnpm --filter @marathon/demo-k1 start

      - name: Kernel demo (K1 brokered delivery)
        run: pnpm --filter @marathon/demo-k1-brokered start

      - name: Kernel demo (K1 sandbox network reality)
        run: pnpm --filter @marathon/demo-k1-network start

      - name: Kernel demo (K2 delivery fan-out)
        run: pnpm --filter @marathon/demo-k2 start

      - name: Kernel demo (K3 iteration continuity)
        run: pnpm --filter @marathon/demo-k3 start

      - name: Kernel demo (K4 kill/resume)
        run: pnpm --filter @marathon/demo-k4 start

      - name: Kernel demo (K5 status + cost)
        run: pnpm --filter @marathon/demo-k5 start

      - name: Automated demo (M0)
        run: pnpm --filter @marathon/demo-m0 start

      - name: Automated demo (M1)
        run: pnpm --filter @marathon/demo-m1 start

      - name: Automated demo (M2)
        run: pnpm --filter @marathon/demo-m2 start

      - name: Automated demo (M3)
        run: pnpm --filter @marathon/demo-m3 start

      - name: Automated demo (M4)
        run: pnpm --filter @marathon/demo-m4 start

      - name: Automated demo (M5)
        run: pnpm --filter @marathon/demo-m5 start

      - name: Automated demo (Slack app / M5.5)
        run: pnpm --filter @marathon/demo-slack-app start

      - name: Automated demo (M6)
        run: pnpm --filter @marathon/demo-m6 start

      - name: Automated demo (M6.1 governed tools)
        run: pnpm --filter @marathon/demo-m6-1 start

      - name: Automated demo (M7 memory)
        run: pnpm --filter @marathon/demo-m7 start

      - name: Automated demo (M8 observability)
        run: pnpm --filter @marathon/demo-m8 start

      - name: Automated demo (M9 security)
        run: pnpm --filter @marathon/demo-m9 start

      # The trust-profile FLOOR contract (design §30.3): one deterministic case
      # per invariant. In-memory (no Postgres/Docker) — a regression in the floor
      # that holds in EVERY profile fails here.
      - name: Floor contract (§30 trust profiles)
        run: pnpm --filter @marathon/demo-floor start

      - name: Automated demo (M6.2 github webhook app)
        run: pnpm --filter @marathon/demo-github-app start
